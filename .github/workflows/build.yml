name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Wrap into Bento.app
        run: ./scripts/build-app.sh release

      - name: Verify CLI binary launches
        run: ./build/Bento.app/Contents/MacOS/bentocli --version

      - name: Verify ad-hoc signature is intact
        run: codesign --verify --verbose ./build/Bento.app
